<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruse.pro | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffffff; --bg: #000000; --card: #080808; }
        body { background-color: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; text-align: center; }
        
        /* Navbar */
        .navbar { padding: 20px; display: flex; justify-content: space-around; align-items: center; border-bottom: 1px solid #111; position: sticky; top: 0; background: rgba(0,0,0,0.9); z-index: 1000; }
        .nav-links a { color: #666; text-decoration: none; margin: 0 15px; font-family: 'Orbitron'; font-size: 0.8rem; transition: 0.3s; }
        .nav-links a:hover { color: #fff; }
        .user-area button { background: #fff; color: #000; border: none; padding: 8px 15px; border-radius: 4px; font-family: 'Orbitron'; cursor: pointer; font-size: 0.7rem; }

        /* Login Modal */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 40px; border: 1px solid #222; border-radius: 10px; width: 300px; }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        .modal-content button { width: 100%; padding: 10px; background: #fff; color: #000; border: none; font-family: 'Orbitron'; cursor: pointer; margin-top: 10px; }

        /* Hero */
        .hero { padding: 80px 20px; }
        .logo-text { font-family: 'Orbitron'; font-size: 5rem; margin: 0; letter-spacing: 10px; }
        .slogan { color: #444; letter-spacing: 3px; margin-bottom: 40px; }

        /* Downloads */
        .download-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding-bottom: 100px; }
        .dl-card { background: var(--card); border: 1px solid #111; padding: 30px; width: 280px; border-radius: 8px; transition: 0.3s; }
        .dl-card:hover { border-color: #444; transform: translateY(-5px); }
        .btn { display: block; padding: 15px; text-decoration: none; font-family: 'Orbitron'; margin-top: 20px; border-radius: 4px; }
        .btn-free { background: #fff; color: #000; }
        .btn-pro { border: 1px solid #333; color: #fff; }

        /* Ekip */
        .team-grid { display: flex; justify-content: center; gap: 15px; padding: 50px; background: #030303; }
        .team-card { border: 1px solid #111; padding: 20px; width: 180px; }
        .team-card span { display: block; color: #444; font-size: 0.7rem; }
        .team-card b { color: #fff; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-links">
            <a href="https://www.youtube.com/@ruse-pro">YOUTUBE</a>
            <a href="#downloads">HİLELER</a>
            <a href="#ekip">EKİP</a>
        </div>
        <div class="user-area" id="userArea">
            <button onclick="openModal('loginModal')">GİRİŞ YAP</button>
        </div>
    </div>

    <div class="hero">
        <h1 class="logo-text">RUSE.PRO</h1>
        <p class="slogan">GELECEĞİN HİLE TEKNOLOJİSİ</p>
    </div>

    <div id="downloads" class="download-container">
        <div class="dl-card">
            <h3 style="font-family:'Orbitron'">RUSE FREE</h3>
            <p>Ücretsiz versiyon.</p>
            <a href="./RuseFree.jar" download class="btn btn-free">İNDİR</a>
        </div>
        <div class="dl-card">
            <h3 style="font-family:'Orbitron'">RUSE PRO</h3>
            <p>30 TL / Haftalık</p>
            <a href="javascript:void(0)" onclick="alert('PRO üyelik için Discord: Xmurat77')" class="btn btn-pro">SATIN AL</a>
        </div>
    </div>

    <div id="ekip" class="team-grid">
        <div class="team-card"><span>KURUCU</span><b>Xmurat77</b></div>
        <div class="team-card"><span>KURUCU ORTAK</span><b>DarkMert1233</b></div>
        <div class="team-card"><span>TASARIMCI</span><b>DarkXweeyz</b></div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 style="font-family:'Orbitron'">GİRİŞ</h2>
            <input type="text" id="loginUser" placeholder="Kullanıcı Adı">
            <input type="password" id="loginPass" placeholder="Şifre">
            <button onclick="login()">GİRİŞ YAP</button>
            <p style="font-size: 0.7rem; color: #444; margin-top: 15px; cursor: pointer;" onclick="closeModal('loginModal'); openModal('regModal')">Hesabın yok mu? Kayıt ol</p>
            <button onclick="closeModal('loginModal')" style="background:transparent; color:#444; border:none">Kapat</button>
        </div>
    </div>

    <div id="regModal" class="modal">
        <div class="modal-content">
            <h2 style="font-family:'Orbitron'">KAYIT OL</h2>
            <input type="text" id="regUser" placeholder="Kullanıcı Adı">
            <input type="password" id="regPass" placeholder="Şifre">
            <button onclick="register()">KAYIT OL</button>
            <button onclick="closeModal('regModal')" style="background:transparent; color:#444; border:none">Kapat</button>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function register() {
            const user = document.getElementById('regUser').value;
            const pass = document.getElementById('regPass').value;
            if(user && pass) {
                localStorage.setItem('ruseUser', user);
                localStorage.setItem('rusePass', pass);
                alert('Kayıt Başarılı! Giriş yapabilirsiniz.');
                closeModal('regModal');
                openModal('loginModal');
            }
        }

        function login() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            if(user === localStorage.getItem('ruseUser') && pass === localStorage.getItem('rusePass')) {
                document.getElementById('userArea').innerHTML = `<span style="font-family:'Orbitron'; font-size:0.8rem">HOŞ GELDİN, ${user.toUpperCase()}</span>`;
                closeModal('loginModal');
            } else {
                alert('Hatalı kullanıcı adı veya şifre!');
            }
        }
    </script>
</body>
</html>
