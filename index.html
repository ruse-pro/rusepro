<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruse.pro | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffcc; --secondary: #0072ff; --bg: #050505; }
        body { background-color: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        
        /* Arka plan ışık efekti */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #00ffcc05 0%, transparent 80%);
            z-index: -1;
        }

        .header { padding: 30px; position: sticky; top: 0; backdrop-filter: blur(10px); z-index: 100; }
        
        /* İndirme Butonu - RusePro.jar için ayarlandı */
        .download-btn {
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 15px 45px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.4s;
            display: inline-block;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            letter-spacing: 2px;
        }
        .download-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); transform: translateY(-3px); }

        .hero { padding: 100px 20px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 10vw, 5rem); margin: 0; background: linear-gradient(to bottom, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(0, 255, 204, 0.3)); }
        
        /* Senin Sloganın */
        .slogan { font-size: 1.6rem; color: #aaa; margin: 20px 0 50px 0; font-style: italic; }
        .slogan span { color: var(--primary); font-weight: bold; font-style: normal; }

        /* Developers Kısmı (İngilizce) */
        .dev-section { padding: 50px 20px; }
        .section-title { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; margin-bottom: 40px; color: #fff; }
        .dev-container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .dev-card { background: #0f0f0f; border: 1px solid #222; padding: 35px; width: 240px; border-radius: 20px; transition: 0.4s; border-bottom: 3px solid var(--secondary); }
        .dev-card:hover { border-color: var(--secondary); transform: translateY(-12px); box-shadow: 0 10px 30px rgba(0, 114, 255, 0.2); }
        .dev-name { font-size: 1.8rem; display: block; font-weight: bold; margin-bottom: 5px; }
        .dev-role { color: var(--secondary); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px; font-weight: 600; }

        footer { padding: 60px; color: #333; font-size: 0.9rem; border-top: 1px solid #111; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="./RusePro.jar" download="RusePro.jar" class="download-btn">DOWNLOAD NOW</a>
    </div>

    <div class="hero">
        <h1>RUSE.PRO</h1>
        <p class="slogan">You don't need to play well. <span>Ruse.pro</span> will handle it.</p>
    </div>

    <div class="dev-section">
        <h2 class="section-title">OUR DEVELOPERS</h2>
        <div class="dev-container">
            <div class="dev-card">
                <span class="dev-name">Trickster</span>
                <span class="dev-role">Founder & Lead Dev</span>
            </div>
            <div class="dev-card">
                <span class="dev-name">DarkMertatom</span>
                <span class="dev-role">Co-Founder</span>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 Ruse.pro | Engineered for perfection.
    </footer>

</body>
</html>
