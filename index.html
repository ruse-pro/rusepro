<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruse.pro | Hilenin Tek Adresi</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --bg: #080808; --panel: #111; --border: #222; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { background: var(--bg); color: #eee; font-family: 'Rajdhani', sans-serif; margin: 0; min-height: 100vh; }
        
        .navbar { padding: 20px 10%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #000; position: sticky; top:0; z-index:100; }
        .nav-links button { background: none; border: none; color: #666; font-family: 'Orbitron'; cursor: pointer; margin-left: 15px; font-size: 0.8rem; }
        .nav-links button:hover, .nav-links button.active { color: var(--accent); }

        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 40px; border-radius: 8px; text-align: center; }
        
        input { background: #000; border: 1px solid #333; padding: 12px; color: #fff; font-family: 'Orbitron'; width: 100%; max-width: 350px; text-align: center; border-radius: 4px; margin-bottom: 12px; outline: none; }
        .btn { background: #eee; color: #000; border: none; padding: 12px 25px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; border-radius: 4px; width: 100%; max-width: 350px; }
        .btn:hover { background: var(--accent); transform: translateY(-2px); }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: #151515; border: 1px solid var(--border); padding: 30px; border-radius: 8px; text-align: center; margin-top: 20px; }
        .price { font-size: 2.5rem; display: block; margin: 20px 0; font-family: 'Orbitron'; color: var(--accent); }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
    </style>
</head>
<body>

    <div id="dlScreen" class="overlay">
        <h1 style="font-family:'Orbitron'; color:var(--accent);">ÖDEME ONAYLANDI</h1>
        <p style="margin-bottom: 25px; color: #888;">Ruse.pro Client indirilmeye hazır.</p>
        <a href="https://senin-siten.com/dosyalar/ruse_pro.jar" download class="btn" style="text-decoration:none; background:var(--accent); display:inline-block; line-height:1.2;">İNDİR (.JAR)</a>
        <br><br>
        <button class="btn" onclick="document.getElementById('dlScreen').style.display='none'" style="background:transparent; color:#555; border:1px solid #333;">KAPAT</button>
    </div>

    <div class="navbar">
        <div style="font-family:'Orbitron'; font-weight:700; letter-spacing:2px; color: var(--accent);">RUSE.PRO</div>
        <div class="nav-links" id="mainMenu" style="display:none">
            <button onclick="show('shop')" id="b-shop">MAĞAZA</button>
            <button onclick="show('wallet')" id="b-wallet">CÜZDAN</button>
            <button onclick="show('team')" id="b-team">EKİP</button>
        </div>
    </div>

    <div class="container">
        <div id="authBox" class="panel">
            <h2 style="font-family:'Orbitron'; margin-bottom:25px;">GİRİŞ / KAYIT</h2>
            <input type="email" id="regEmail" placeholder="E-POSTA ADRESİ"><br>
            <input type="text" id="regUser" placeholder="KULLANICI ADI"><br>
            <input type="password" id="regPass" placeholder="ŞİFRE"><br>
            <button class="btn" onclick="handleAuth()">SİSTEME GİR</button>
        </div>

        <div id="p-shop" class="page">
            <div class="panel" style="padding:15px; margin-bottom:20px;">
                <p style="margin:0; font-family:'Orbitron'">BAKİYE: <span id="userBal" style="color:var(--accent)">0</span> TL</p>
            </div>
            <div class="card">
                <h2 style="font-family:'Orbitron'; margin:10px 0;">RUSE.PRO FULL ACCESS</h2>
                <span class="price">100 TL</span>
                <button class="btn" onclick="buyRuse()">SATIN AL VE İNDİR</button>
            </div>
        </div>

        <div id="p-wallet" class="page">
            <div class="panel">
                <h2 style="font-family:'Orbitron'">BAKİYE YÜKLE</h2>
                <input type="text" id="coupon" placeholder="KODU GİR"><br>
                <button class="btn" onclick="redeem()">ONAYLA</button>
                <br><br>
                <a href="https://www.itemsatis.com/minecraft/ruse-bakiye-100tl-5139335.html" target="_blank" style="color:var(--accent); text-decoration:none;">İtemSatış'tan Kod Al</a>
            </div>
        </div>

        <div id="p-team" class="page">
            <div class="card"><span>KURUCU</span><h3>Trickster</h3></div>
            <div class="card"><span>ORTAK</span><h3>DarkMertatom</h3></div>
        </div>

        <div id="adminPanel" class="page">
            <div class="panel" style="border-color: var(--accent);">
                <h2 style="font-family:'Orbitron'">ADMIN CONTROL</h2>
                <input type="number" id="genAmount" placeholder="TL MİKTARI"><br>
                <button class="btn" onclick="generateAndSend()" style="background:var(--accent)">KOD ÜRET VE DC'YE AT</button>
            </div>
        </div>
    </div>

    <script>
        const WH = "https://discord.com/api/webhooks/1491501294920401017/FFsIOxHwhyE1cSzWXPiKJJIHESAkzxfDI7oizQG15SW-nN6V4jxpTMf8YO9GPZooW6Ct";
        const ADMIN_PASS = "ruse.admin.1234";

        function handleAuth() {
            const m = document.getElementById('regEmail').value.trim();
            const u = document.getElementById('regUser').value.trim();
            const p = document.getElementById('regPass').value.trim();
            if(!m || !u || !p) return alert("Doldur!");

            const savedUser = localStorage.getItem('r_user');
            if(savedUser && savedUser === u && localStorage.getItem('r_mail') !== m) return alert("Bu isim kapılmış!");

            localStorage.setItem('r_mail', m);
            localStorage.setItem('r_user', u);
            localStorage.setItem('r_pass', p);
            if(!localStorage.getItem('r_bal')) localStorage.setItem('r_bal', '0');
            localStorage.setItem('isLogged', 'true');
            location.reload();
        }

        window.onload = () => {
            if(localStorage.getItem('isLogged')) {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('mainMenu').style.display = 'flex';
                document.getElementById('userBal').innerText = localStorage.getItem('r_bal');
                checkHash();
            }
        };

        window.onhashchange = checkHash;

        function checkHash() {
            if(window.location.hash === "#kod") {
                let pass = prompt("Admin Şifresi:");
                if(pass === ADMIN_PASS) {
                    show('adminPanel');
                } else { window.location.hash = ""; show('shop'); }
            } else {
                if(localStorage.getItem('isLogged')) show('shop');
            }
        }

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-' + id)?.classList.add('active'); // Normal sayfalar için
            document.getElementById(id)?.classList.add('active'); // Admin panel için
        }

        function buyRuse() {
            let bal = parseInt(localStorage.getItem('r_bal')) || 0;
            if(bal >= 100) {
                bal -= 100;
                localStorage.setItem('r_bal', bal);
                document.getElementById('dlScreen').style.display = 'flex';
                document.getElementById('userBal').innerText = bal;
            } else { alert("Bakiye yetersiz!"); }
        }

        function redeem() {
            const code = document.getElementById('coupon').value.toUpperCase();
            let codes = JSON.parse(localStorage.getItem('ruse_dynamic_codes')) || {};
            if(codes[code]) {
                let bal = (parseInt(localStorage.getItem('r_bal')) || 0) + codes[code];
                localStorage.setItem('r_bal', bal);
                delete codes[code];
                localStorage.setItem('ruse_dynamic_codes', JSON.stringify(codes));
                alert("Başarılı!");
                location.reload();
            } else { alert("Geçersiz!"); }
        }

        function generateAndSend() {
            const amt = parseInt(document.getElementById('genAmount').value);
            if(!amt) return;
            const code = "RUSE-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            let codes = JSON.parse(localStorage.getItem('ruse_dynamic_codes')) || {};
            codes[code] = amt;
            localStorage.setItem('ruse_dynamic_codes', JSON.stringify(codes));

            fetch(WH, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ embeds: [{ title: "🛠 YENİ KOD", description: `**Kod:** ||${code}||\n**Değer:** ${amt} TL`, color: 5763719 }] })
            }).then(() => alert("Kod DC'ye uçtu!"));
        }
    </script>
</body>
</html>
