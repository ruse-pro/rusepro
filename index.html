<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruse.pro | Official</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffffff; --bg: #000000; --gray: #111111; }
        body { background-color: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; text-align: center; }
        
        .header { padding: 30px; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #222; }
        
        .download-btn {
            font-family: 'Orbitron', sans-serif;
            background: #fff;
            color: #000;
            padding: 15px 40px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
            display: inline-block;
            letter-spacing: 2px;
            border: 2px solid #fff;
        }
        .download-btn:hover { background: transparent; color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.2); }

        .hero { padding: 80px 20px; }
        
        /* Logonu buraya bir yazı veya görsel olarak ekleyebilirsin */
        .logo-text { 
            font-family: 'Orbitron', sans-serif; 
            font-size: clamp(3rem, 10vw, 5rem); 
            margin: 0; 
            letter-spacing: 5px;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .slogan { font-size: 1.4rem; color: #888; margin: 20px 0 50px 0; letter-spacing: 1px; }

        .video-container {
            margin: 40px auto;
            max-width: 900px;
            width: 95%;
            border: 1px solid #333;
            background: #050505;
            border-radius: 10px;
            overflow: hidden;
        }
        .video-container iframe { width: 100%; aspect-ratio: 16 / 9; border: none; display: block; }

        .dev-section { padding: 60px 20px; background: #050505; }
        .dev-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .dev-card { border: 1px solid #222; padding: 30px; width: 200px; border-radius: 10px; transition: 0.3s; }
        .dev-card:hover { border-color: #555; background: #0a0a0a; }
        .dev-name { font-size: 1.5rem; display: block; font-weight: bold; margin-bottom: 5px; }
        .dev-role { color: #666; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        footer { padding: 40px; color: #444; font-size: 0.8rem; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <div class="header">
        <a href="./RusePro.jar" download="RusePro.jar" class="download-btn">DOWNLOAD NOW</a>
    </div>

    <div class="hero">
        <h1 class="logo-text">RUSE.PRO</h1>
        <p class="slogan">YOU DON'T NEED TO PLAY WELL. RUSE.PRO WILL HANDLE IT.</p>
        
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/BURAYA_VIDEO_ID" title="Ruse.pro Showcase" allowfullscreen></iframe>
        </div>
    </div>

    <div class="dev-section">
        <div class="dev-container">
            <div class="dev-card">
                <span class="dev-name">Trickster</span>
                <span class="dev-role">Founder</span>
            </div>
            <div class="dev-card">
                <span class="dev-name">DarkMertatom</span>
                <span class="dev-role">Co-Founder</span>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 THE OFFICIAL RUSE.PRO CHEAT PLATFORM
    </footer>

    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>

</body>
</html>
