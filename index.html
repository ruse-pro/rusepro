<script>
    // Bakiyeyi ve kullanılmış kodları hafızadan çek
    let balance = parseInt(localStorage.getItem('userBalance')) || 0;
    let usedCodes = JSON.parse(localStorage.getItem('usedCodes')) || [];

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Kullanıcı giriş yapmışsa arayüzü güncelle
    function updateUI(username) {
        document.getElementById('userPanel').innerHTML = `
            <div class="balance-tag">${balance} TL</div>
            <span style="font-family:'Orbitron'; font-size:0.7rem; color:#fff;">${username.toUpperCase()}</span>
        `;
        document.getElementById('wallet').style.display = 'block';
    }

    // BAKİYE YÜKLEME SİSTEMİ (STRICT SINGLE-USE)
    function addBalance() {
        const codeInput = document.getElementById('redeemCode');
        const code = codeInput.value.trim().toUpperCase();
        
        // 1. KOD DAHA ÖNCE KULLANILMIŞ MI?
        if (usedCodes.includes(code)) {
            alert('HATA: Bu kod zaten kullanılmış! Tekrar kullanamazsın.');
            return;
        }

        // 2. ÖZEL ONAY SİSTEMİ (30TLÖDE Kodu İçin)
        if (code === "30TLÖDE") {
            const onay = confirm("Bu işlem için yönetici onayı gerekiyor (Email gönderilecek). Onaylıyor musun?");
            if (onay) {
                alert("İstek Trickster'a (Xmurat77) email olarak gönderildi. Onay gelince bakiyen tanımlanacak.");
                // Burada gerçek bir email API'si (EmailJS gibi) bağlanabilir.
                return; 
            } else {
                return;
            }
        }

        // 3. KOD LİSTESİ VE MİKTARLAR
        const promoCodes = {
            "İLKHİLEM": 1, "ABONE": 1, "RUSEPRO": 5, "RUSEFREE": 1,
            "TRİCKSTER": 10, "DARKMERTATOM": 10, "YOUTUBE": 2, "DİSCORD": 2
        };

        if (promoCodes[code]) {
            let amount = promoCodes[code];
            
            // Kodu 'kullanıldı' listesine ekle ve kaydet
            usedCodes.push(code);
            localStorage.setItem('usedCodes', JSON.stringify(usedCodes));
            
            // Bakiyeyi ekle ve kaydet
            balance += amount;
            localStorage.setItem('userBalance', balance);
            
            alert('BAŞARILI! ' + amount + ' TL yüklendi. Bu kod artık geçersizdir.');
            location.reload(); 
        } else {
            alert('Geçersiz veya hatalı kod!');
        }
    }

    function buyProduct(price) {
        if(!localStorage.getItem('ruseUser')) {
            alert('Önce giriş yapmalısın!');
            openModal('loginModal');
            return;
        }
        if(balance >= price) {
            balance -= price;
            localStorage.setItem('userBalance', balance);
            alert('Ödeme alındı! Ürününüz aktif edildi.');
            location.reload();
        } else {
            alert('Bakiye yetersiz! Lütfen kod bozdurarak bakiye yükleyin.');
        }
    }

    // Sayfa açıldığında giriş kontrolü
    window.onload = function() {
        const savedUser = localStorage.getItem('ruseUser');
        if(savedUser) updateUI(savedUser);
    }
</script>
