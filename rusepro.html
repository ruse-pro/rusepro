<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruse.pro | Global</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        /* En Üstteki İndirme Butonu */
        .top-nav {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
        }

        .download-btn {
            background: linear-gradient(90deg, #00ff96, #0072ff);
            color: #000;
            padding: 15px 40px;
            text-decoration: none;
            font-weight: 800;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(0, 255, 150, 0.2);
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(0, 255, 150, 0.5);
        }

        .hero {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 5px;
            margin: 0;
            color: #fff;
        }

        .subtitle {
            color: #555;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* Developers Bölümü (İngilizce) */
        .dev-section {
            background: #111;
            padding: 40px;
            border-radius: 20px;
            width: 80%;
            max-width: 600px;
            border: 1px solid #222;
        }

        .dev-section h2 {
            text-align: center;
            color: #00ff96;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dev-grid {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }

        .dev-card {
            text-align: center;
            padding: 20px;
            background: #0f0f0f;
            border-radius: 12px;
            width: 200px;
            border-bottom: 3px solid #0072ff;
        }

        .dev-name {
            font-size: 1.2rem;
            font-weight: bold;
            display: block;
        }

        .dev-role {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
            display: block;
        }

        .footer-text {
            margin-top: 50px;
            color: #333;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="#" class="download-btn">DOWNLOAD NOW</a>
    </div>

    <div class="hero">
        <h1>RUSE.PRO</h1>
        <p class="subtitle">Gelecek nesil performans sistemi.</p>
    </div>

    <div class="dev-section">
        <h2>Our Developers</h2>
        <div class="dev-grid">
            <div class="dev-card">
                <span class="dev-name">Trickster</span>
                <span class="dev-role">Founder & Lead Dev</span>
            </div>
            <div class="dev-card">
                <span class="dev-name">DarkMertatom</span>
                <span class="dev-role">Co-Founder</span>
            </div>
        </div>
    </div>

    <div class="footer-text">
        © 2026 Ruse.pro - Tüm Hakları Saklıdır.
    </div>

</body>
</html>
